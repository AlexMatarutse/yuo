<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auriom AI — Lead Finder Machine</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23F59E0B'/><text x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='20' font-weight='bold' fill='%230B0E11'>A</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0B0E11; color: #E8ECF1; font-family: 'DM Sans', system-ui, sans-serif; }
    input:focus, select:focus, textarea:focus { outline: none; }
    ::selection { background: #F59E0B; color: #0B0E11; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #12161C; }
    ::-webkit-scrollbar-thumb { background: #252B35; border-radius: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes glowPulse { 0%,100% { box-shadow: 0 0 20px rgba(245,158,11,0.15); } 50% { box-shadow: 0 0 40px rgba(245,158,11,0.15), 0 0 60px rgba(245,158,11,0.08); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Direct calls to ngrok tunnel → localhost:5678/webhook
    // No CORS issues — browser only talks to same origin
    const N8N_BASE = "https://nectar-external-lurch.ngrok-free.dev/webhook";
    const PRICE_PER_LEAD = 0.50;

    const C = {
      bg: "#0B0E11", surface: "#12161C", card: "#181D25",
      border: "#252B35", borderHover: "#3A4250",
      accent: "#F59E0B", accentDim: "#B47708",
      accentGlow: "rgba(245, 158, 11, 0.15)",
      text: "#E8ECF1", textMid: "#9AA3B0", textDim: "#5C6370",
      success: "#34D399", successDim: "rgba(52, 211, 153, 0.12)",
      error: "#F87171",
    };

    const ROLES = ["CEO","Founder","Owner","Managing Director","Marketing Manager","Sales Director","CTO","Operations Manager","HR Director","CFO"];

    const STEPS = [
      { key: "init", label: "Initialising search" },
      { key: "geocode", label: "Geocoding location" },
      { key: "places", label: "Finding businesses" },
      { key: "enrich", label: "Enriching contacts" },
      { key: "done", label: "Complete" },
    ];

    // Icons
    const Icon = ({ d, size = 16, stroke }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={stroke || "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {typeof d === "string" ? <path d={d} /> : d}
      </svg>
    );
    const SearchIcon = () => <Icon size={18} d={<><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></>} />;
    const MapPinIcon = () => <Icon d={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></>} />;
    const TargetIcon = () => <Icon d={<><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></>} />;
    const UsersIcon = () => <Icon d={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></>} />;
    const DollarIcon = () => <Icon d={<><line x1="12" y1="1" x2="12" y2="23" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></>} />;
    const DownloadIcon = () => <Icon d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></>} />;
    const RadiusIcon = () => <Icon d={<><circle cx="12" cy="12" r="10" /><line x1="12" y1="12" x2="12" y2="8" /><line x1="12" y1="12" x2="16" y2="12" /></>} />;
    const CheckIcon = () => <Icon stroke={C.success} d={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></>} />;
    const Spinner = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ animation: "spin 1s linear infinite" }}>
        <line x1="12" y1="2" x2="12" y2="6" /><line x1="12" y1="18" x2="12" y2="22" /><line x1="4.93" y1="4.93" x2="7.76" y2="7.76" /><line x1="16.24" y1="16.24" x2="19.07" y2="19.07" /><line x1="2" y1="12" x2="6" y2="12" /><line x1="18" y1="12" x2="22" y2="12" /><line x1="4.93" y1="19.07" x2="7.76" y2="16.24" /><line x1="16.24" y1="7.76" x2="19.07" y2="4.93" />
      </svg>
    );

    // CSV
    function downloadCSV(leads, filename) {
      if (!leads.length) return;
      const headers = Object.keys(leads[0]);
      const rows = leads.map(r => headers.map(h => `"${String(r[h]||"").replace(/"/g,'""')}"`).join(","));
      const csv = [headers.join(","), ...rows].join("\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
      a.download = filename;
      a.click();
    }

    // Demo data
    function getDemoLeads() {
      return [
        { Company:"Sunrise Bakery", Address:"14 Samora Machel Ave, Harare", Phone:"+263 77 123 4567", Website:"sunrisebakery.co.zw", Rating:"4.5", Contact:"Tendai Moyo", Title:"Owner", Email:"tendai@sunrisebakery.co.zw", LinkedIn:"linkedin.com/in/tendaimoyo", Instagram:"@sunrisebakery_hre" },
        { Company:"GreenLeaf Organics", Address:"22 Enterprise Rd, Harare", Phone:"+263 71 987 6543", Website:"greenleaf.co.zw", Rating:"4.2", Contact:"Rutendo Chigwedere", Title:"Founder", Email:"rutendo@greenleaf.co.zw", LinkedIn:"linkedin.com/in/rutendoc", Instagram:"@greenleaf_zw" },
        { Company:"TechHub Solutions", Address:"8 Jason Moyo Ave, Bulawayo", Phone:"+263 29 265 4321", Website:"techhub.co.zw", Rating:"4.7", Contact:"Farai Ndlovu", Title:"CEO", Email:"farai@techhub.co.zw", LinkedIn:"linkedin.com/in/faraindlovu", Instagram:"NA" },
        { Company:"Matopos Lodge", Address:"Matopos Rd, Bulawayo", Phone:"+263 29 247 8900", Website:"matoposlodge.co.zw", Rating:"4.8", Contact:"Sikhulile Dube", Title:"Managing Director", Email:"sikhulile@matoposlodge.co.zw", LinkedIn:"linkedin.com/in/sdube", Instagram:"@matopos_lodge" },
        { Company:"AutoParts Zimbabwe", Address:"Cnr Mutare Rd & 5th St, Harare", Phone:"+263 24 270 1234", Website:"autoparts.co.zw", Rating:"3.9", Contact:"Blessing Mhandu", Title:"Sales Director", Email:"blessing@autoparts.co.zw", LinkedIn:"NA", Instagram:"NA" },
      ];
    }

    // Styles
    const inputStyle = { width:"100%", padding:"10px 14px", borderRadius:8, border:`1px solid ${C.border}`, background:C.surface, color:C.text, fontSize:13, fontFamily:"'DM Sans', sans-serif" };
    const cellStyle = { padding:"12px 16px", color:C.textMid, whiteSpace:"nowrap" };
    const secondaryBtn = { padding:"10px 20px", borderRadius:10, border:`1px solid ${C.border}`, background:C.surface, color:C.textMid, fontSize:13, fontWeight:500, cursor:"pointer", fontFamily:"'DM Sans', sans-serif" };

    function FieldGroup({ icon, label, children }) {
      return (
        <div>
          <label style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, fontWeight:500, color:C.textMid, marginBottom:8 }}>{icon} {label}</label>
          {children}
        </div>
      );
    }

    // ══════════════════════════════════════
    //  MAIN APP
    // ══════════════════════════════════════
    function App() {
      const [location, setLocation] = useState("");
      const [niche, setNiche] = useState("");
      const [radius, setRadius] = useState(5000);
      const [leadCount, setLeadCount] = useState(20);
      const [selectedRoles, setSelectedRoles] = useState(["Owner","Founder"]);
      const [customRole, setCustomRole] = useState("");
      const [phase, setPhase] = useState("input");
      const [currentStep, setCurrentStep] = useState(0);
      const [leads, setLeads] = useState([]);
      const [errorMsg, setErrorMsg] = useState("");
      const [elapsed, setElapsed] = useState(0);
      const timerRef = useRef(null);
      const totalCost = (leadCount * PRICE_PER_LEAD).toFixed(2);
      const canSubmit = location && niche && selectedRoles.length > 0;

      function toggleRole(r) { setSelectedRoles(p => p.includes(r) ? p.filter(x=>x!==r) : [...p, r]); }
      function addCustomRole() { const t = customRole.trim(); if (t && !selectedRoles.includes(t)) { setSelectedRoles(p=>[...p,t]); setCustomRole(""); } }
      const formatTime = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
      useEffect(() => () => clearInterval(timerRef.current), []);

      // Live only — real n8n webhooks, no fallback
      async function runSearch() {
        setPhase("running"); setElapsed(0); setErrorMsg("");
        timerRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
        const jobId = `job_${Date.now()}`;

        try {
          // Workflow 1: Find businesses
          setCurrentStep(0);
          const res1 = await fetch(`${N8N_BASE}/lead-finder`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ location, niche, radius: String(radius), leadCount, targetRoles: selectedRoles.join(","), job_id: jobId }),
          });
          if (!res1.ok) {
            const errText = await res1.text().catch(() => "");
            throw new Error(`Workflow 1 failed (${res1.status}): ${errText}`);
          }
          setCurrentStep(2);

          // Workflow 2: Enrich contacts
          setCurrentStep(3);
          const res2 = await fetch(`${N8N_BASE}/get-persons`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ job_id: jobId, target_roles: selectedRoles.join(","), max_items: leadCount }),
          });
          if (!res2.ok) {
            const errText = await res2.text().catch(() => "");
            throw new Error(`Workflow 2 failed (${res2.status}): ${errText}`);
          }
          let data2;
          try { data2 = await res2.json(); } catch(e) { data2 = []; }
          setCurrentStep(4);
          // n8n returns array of items directly, or wrapped in an array
          const results = Array.isArray(data2) ? data2 : (data2.leads || data2.data || [data2]);
          // Normalize field names from Google Sheets columns
          const normalized = results.map(r => ({
            Company: r['Company Name'] || r.company_name || r.Company || r.displayName || '',
            Address: r['Address'] || r.formattedAddress || r.address || '',
            Phone: r['Phone Number'] || r.nationalPhoneNumber || r.Phone || '',
            Website: r['Website URL'] || r.websiteUri || r.Website || '',
            Contact: r['Person Name'] || r.name || r.Contact || '',
            Title: r['Title'] || r.title || r.Title || '',
            Email: r['Person Email'] || r.email || r.Email || '',
            LinkedIn: r['Linked In '] || r.linkedin || r.LinkedIn || 'NA',
            Instagram: r['Instagram'] || r.instagram || 'NA',
          })).filter(r => r.Company || r.Contact);
          setLeads(normalized);
          setPhase("done");
        } catch (err) {
          setErrorMsg(err.message);
          setPhase("error");
        } finally {
          clearInterval(timerRef.current);
        }
      }

      function handleReset() { setPhase("input"); setCurrentStep(0); setLeads([]); setElapsed(0); setErrorMsg(""); }

      return (
        <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"'DM Sans', system-ui, sans-serif" }}>

          {/* HEADER */}
          <header style={{ borderBottom:`1px solid ${C.border}`, background:C.surface, padding:"16px 32px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ width:36, height:36, borderRadius:8, background:`linear-gradient(135deg, ${C.accent}, ${C.accentDim})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, fontWeight:700, color:C.bg }}>A</div>
              <div>
                <div style={{ fontWeight:700, fontSize:16, letterSpacing:"-0.02em" }}>Auriom AI</div>
                <div style={{ fontSize:11, color:C.textDim, fontFamily:"'JetBrains Mono', monospace", letterSpacing:"0.05em" }}>LEAD FINDER MACHINE</div>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:11, padding:"4px 10px", background:C.card, borderRadius:6, border:`1px solid ${C.border}`, color:C.textMid }}>v2.0</span>
            </div>
          </header>

          <div style={{ maxWidth:900, margin:"0 auto", padding:"32px 24px" }}>

            {/* INPUT */}
            {phase === "input" && (
              <div style={{ animation:"fadeUp 0.4s ease-out" }}>
                <div style={{ textAlign:"center", marginBottom:40 }}>
                  <h1 style={{ fontSize:32, fontWeight:700, letterSpacing:"-0.03em", background:`linear-gradient(135deg, ${C.text} 0%, ${C.accent} 100%)`, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", marginBottom:10 }}>
                    Find Decision-Makers, Fast.
                  </h1>
                  <p style={{ fontSize:15, color:C.textMid, maxWidth:520, margin:"0 auto", lineHeight:1.6 }}>
                    Enter a location and niche. We'll find businesses, identify key contacts by title, and deliver enriched leads with emails and socials.
                  </p>
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, background:C.card, borderRadius:16, border:`1px solid ${C.border}`, padding:28 }}>
                  <FieldGroup icon={<MapPinIcon />} label="Business Location">
                    <input value={location} onChange={e=>setLocation(e.target.value)} placeholder="e.g. Harare, Zimbabwe" style={inputStyle} />
                  </FieldGroup>
                  <FieldGroup icon={<TargetIcon />} label="Business Niche">
                    <input value={niche} onChange={e=>setNiche(e.target.value)} placeholder="e.g. real estate, insurance" style={inputStyle} />
                  </FieldGroup>
                  <FieldGroup icon={<RadiusIcon />} label={`Search Radius: ${(radius/1000).toFixed(1)} km`}>
                    <input type="range" min={1000} max={50000} step={1000} value={radius} onChange={e=>setRadius(+e.target.value)} style={{ width:"100%", accentColor:C.accent, cursor:"pointer", height:6 }} />
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:C.textDim, marginTop:4, fontFamily:"'JetBrains Mono', monospace" }}><span>1 km</span><span>50 km</span></div>
                  </FieldGroup>
                  <FieldGroup icon={<UsersIcon />} label={`Target Leads: ${leadCount}`}>
                    <input type="range" min={5} max={200} step={5} value={leadCount} onChange={e=>setLeadCount(+e.target.value)} style={{ width:"100%", accentColor:C.accent, cursor:"pointer", height:6 }} />
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:C.textDim, marginTop:4, fontFamily:"'JetBrains Mono', monospace" }}><span>5</span><span>200</span></div>
                  </FieldGroup>
                  <div style={{ gridColumn:"1 / -1" }}>
                    <FieldGroup icon={<SearchIcon />} label="Target Roles">
                      <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:10 }}>
                        {ROLES.map(role => (
                          <button key={role} onClick={()=>toggleRole(role)} style={{ padding:"6px 14px", borderRadius:20, fontSize:12, fontWeight:500, border:`1px solid ${selectedRoles.includes(role)?C.accent:C.border}`, background:selectedRoles.includes(role)?C.accentGlow:"transparent", color:selectedRoles.includes(role)?C.accent:C.textMid, cursor:"pointer", fontFamily:"'DM Sans', sans-serif" }}>
                            {role}
                          </button>
                        ))}
                      </div>
                      <div style={{ display:"flex", gap:8 }}>
                        <input value={customRole} onChange={e=>setCustomRole(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCustomRole()} placeholder="Add custom role..." style={{ ...inputStyle, flex:1 }} />
                        <button onClick={addCustomRole} style={{ padding:"8px 16px", borderRadius:8, border:`1px solid ${C.border}`, background:C.surface, color:C.textMid, cursor:"pointer", fontSize:12, fontFamily:"'DM Sans', sans-serif" }}>Add</button>
                      </div>
                      {selectedRoles.filter(r=>!ROLES.includes(r)).length > 0 && (
                        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:8 }}>
                          {selectedRoles.filter(r=>!ROLES.includes(r)).map(r => (
                            <span key={r} onClick={()=>toggleRole(r)} style={{ padding:"4px 12px", borderRadius:16, fontSize:11, background:C.accentGlow, color:C.accent, cursor:"pointer", border:`1px solid ${C.accent}` }}>{r} ✕</span>
                          ))}
                        </div>
                      )}
                    </FieldGroup>
                  </div>
                </div>

                <div style={{ marginTop:20, background:C.card, borderRadius:12, border:`1px solid ${C.border}`, padding:"20px 28px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                    <DollarIcon />
                    <div>
                      <div style={{ fontSize:13, color:C.textMid }}>Estimated Cost</div>
                      <div style={{ fontSize:11, color:C.textDim, fontFamily:"'JetBrains Mono', monospace" }}>{leadCount} leads × ${PRICE_PER_LEAD.toFixed(2)} per lead</div>
                    </div>
                  </div>
                  <div style={{ fontSize:28, fontWeight:700, color:C.accent, fontFamily:"'JetBrains Mono', monospace" }}>${totalCost}</div>
                </div>

                <button onClick={()=>canSubmit&&runSearch()} disabled={!canSubmit} style={{ marginTop:20, width:"100%", padding:"16px", borderRadius:12, border:"none", background:canSubmit?`linear-gradient(135deg, ${C.accent}, ${C.accentDim})`:C.border, color:canSubmit?C.bg:C.textDim, fontSize:15, fontWeight:600, cursor:canSubmit?"pointer":"not-allowed", fontFamily:"'DM Sans', sans-serif", display:"flex", alignItems:"center", justifyContent:"center", gap:10 }}>
                  <SearchIcon /> Launch Lead Search
                </button>

                <div style={{ marginTop:40, padding:"24px 28px", background:C.surface, borderRadius:12, border:`1px solid ${C.border}` }}>
                  <h3 style={{ fontSize:14, fontWeight:600, color:C.accent, marginBottom:12 }}>Why This Architecture Wins</h3>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, fontSize:13, color:C.textMid, lineHeight:1.7 }}>
                    <div><div style={{ fontWeight:600, color:C.text, marginBottom:4 }}>Scalable Microservice Design</div>Two independent n8n workflows via webhooks — discover businesses then enrich contacts. Each scales, retries, and rate-limits independently.</div>
                    <div><div style={{ fontWeight:600, color:C.text, marginBottom:4 }}>AI-Powered Enrichment</div>Gemini + Brave Search agent autonomously finds decision-makers by dynamic role targeting. Real-time results, no static databases.</div>
                    <div><div style={{ fontWeight:600, color:C.text, marginBottom:4 }}>Pay-Per-Lead Economics</div>$0.50/lead means zero upfront cost for SMEs. Gross margins scale with volume as per-unit API costs decrease.</div>
                    <div><div style={{ fontWeight:600, color:C.text, marginBottom:4 }}>Market-Ready for Zimbabwe</div>Built for dual-currency (USD/ZiG) SME markets — real estate, car dealerships, insurance — high demand, low automation.</div>
                  </div>
                </div>
              </div>
            )}

            {/* RUNNING */}
            {phase === "running" && (
              <div style={{ animation:"fadeUp 0.4s ease-out" }}>
                <div style={{ background:C.card, borderRadius:16, border:`1px solid ${C.border}`, padding:36, textAlign:"center", animation:"glowPulse 3s ease-in-out infinite" }}>
                  <div style={{ marginBottom:8 }}><Spinner size={32} /></div>
                  <h2 style={{ fontSize:22, fontWeight:600, marginBottom:6 }}>Searching...</h2>
                  <p style={{ fontSize:13, color:C.textMid, fontFamily:"'JetBrains Mono', monospace" }}>{formatTime(elapsed)} elapsed · {niche} in {location}</p>
                  <div style={{ marginTop:32, textAlign:"left", maxWidth:400, margin:"32px auto 0" }}>
                    {STEPS.map((step, i) => {
                      const active = i === currentStep, done = i < currentStep;
                      return (
                        <div key={step.key} style={{ display:"flex", alignItems:"center", gap:14, padding:"10px 0", opacity:done?0.5:active?1:0.3 }}>
                          <div style={{ width:28, height:28, borderRadius:"50%", border:`2px solid ${done?C.success:active?C.accent:C.border}`, background:done?C.successDim:active?C.accentGlow:"transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:600, color:done?C.success:active?C.accent:C.textDim, flexShrink:0 }}>
                            {done ? <CheckIcon /> : active ? <Spinner size={14} /> : (i+1)}
                          </div>
                          <span style={{ fontSize:14, color:done?C.textDim:active?C.text:C.textDim, fontWeight:active?600:400 }}>{step.label}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* ERROR */}
            {phase === "error" && (
              <div style={{ animation:"fadeUp 0.4s ease-out" }}>
                <div style={{ background:C.card, borderRadius:16, border:`1px solid rgba(248,113,113,0.2)`, padding:36, textAlign:"center" }}>
                  <div style={{ fontSize:48, marginBottom:12 }}>⚠</div>
                  <h2 style={{ fontSize:20, fontWeight:600, color:C.error, marginBottom:8 }}>Something went wrong</h2>
                  <p style={{ fontSize:13, color:C.textMid, marginBottom:20, fontFamily:"'JetBrains Mono', monospace" }}>{errorMsg}</p>
                  <button onClick={handleReset} style={secondaryBtn}>Try Again</button>
                </div>
              </div>
            )}

            {/* DONE */}
            {phase === "done" && (
              <div style={{ animation:"fadeUp 0.4s ease-out" }}>
                {/* Status badge */}

                <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:12, marginBottom:20 }}>
                  {[
                    { label:"Businesses Found", value:leads.length, color:C.accent },
                    { label:"Contacts Enriched", value:leads.length, color:C.success },
                    { label:"Time Elapsed", value:formatTime(elapsed), color:C.textMid },
                    { label:"Total Cost", value:`$${totalCost}`, color:C.accent },
                  ].map((s,i) => (
                    <div key={i} style={{ background:C.card, borderRadius:12, border:`1px solid ${C.border}`, padding:"16px 20px", textAlign:"center" }}>
                      <div style={{ fontSize:24, fontWeight:700, color:s.color, fontFamily:"'JetBrains Mono', monospace" }}>{s.value}</div>
                      <div style={{ fontSize:11, color:C.textDim, marginTop:4 }}>{s.label}</div>
                    </div>
                  ))}
                </div>

                <div style={{ display:"flex", gap:12, marginBottom:20 }}>
                  <button onClick={()=>downloadCSV(leads, `leads_${Date.now()}.csv`)} style={{ flex:1, padding:"14px", borderRadius:10, border:"none", background:`linear-gradient(135deg, ${C.accent}, ${C.accentDim})`, color:C.bg, fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:"'DM Sans', sans-serif", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                    <DownloadIcon /> Download CSV
                  </button>
                  <button onClick={handleReset} style={{ ...secondaryBtn, flex:1, padding:"14px", fontSize:14 }}>New Search</button>
                </div>

                <div style={{ background:C.card, borderRadius:16, border:`1px solid ${C.border}`, overflow:"hidden" }}>
                  <div style={{ padding:"16px 24px", borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <span style={{ fontWeight:600, fontSize:15 }}>Lead Results</span>
                    <span style={{ fontSize:12, color:C.textDim, fontFamily:"'JetBrains Mono', monospace" }}>{leads.length} records</span>
                  </div>
                  <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, fontFamily:"'DM Sans', sans-serif" }}>
                      <thead>
                        <tr style={{ borderBottom:`1px solid ${C.border}` }}>
                          {["Company","Contact","Title","Email","Phone","LinkedIn"].map(h => (
                            <th key={h} style={{ padding:"12px 16px", textAlign:"left", color:C.textDim, fontWeight:500, fontSize:11, textTransform:"uppercase", letterSpacing:"0.05em", fontFamily:"'JetBrains Mono', monospace", whiteSpace:"nowrap" }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {leads.map((lead, i) => (
                          <tr key={i} style={{ borderBottom:`1px solid ${C.border}` }}
                              onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <td style={cellStyle}>
                              <div style={{ fontWeight:600, color:C.text }}>{lead.Company}</div>
                              <div style={{ fontSize:10, color:C.textDim, marginTop:2 }}>{lead.Address}</div>
                            </td>
                            <td style={{ ...cellStyle, fontWeight:500 }}>{lead.Contact}</td>
                            <td style={cellStyle}>
                              <span style={{ padding:"3px 10px", borderRadius:12, background:C.accentGlow, color:C.accent, fontSize:10, fontWeight:600 }}>{lead.Title}</span>
                            </td>
                            <td style={{ ...cellStyle, fontFamily:"'JetBrains Mono', monospace", fontSize:11 }}>{lead.Email}</td>
                            <td style={{ ...cellStyle, fontFamily:"'JetBrains Mono', monospace", fontSize:11 }}>{lead.Phone}</td>
                            <td style={cellStyle}>{lead.LinkedIn !== "NA" ? <span style={{ color:C.accent, fontSize:11 }}>View →</span> : <span style={{ color:C.textDim, fontSize:11 }}>—</span>}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
